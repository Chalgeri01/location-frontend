<!DOCTYPE html>
<html>
<head>
  <title>Location Demo</title>
</head>
<body>

<h2>Location Demo</h2>
<p>This demo collects your location after your permission.</p>

<button onclick="getLocation()">Share Location</button>

<p id="status"></p>

<script>
async function getLocation() {
  document.getElementById("status").innerText = "Requesting location...";

  navigator.geolocation.getCurrentPosition(async (pos) => {

    const data = {
      lat: pos.coords.latitude,
      lon: pos.coords.longitude,
      accuracy: pos.coords.accuracy,
      userAgent: navigator.userAgent
    };

    document.getElementById("status").innerText = "Sending...";

    try {
      const res = await fetch("https://location-backend-127d.onrender.com/save", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
      });

      if (res.ok) {
        document.getElementById("status").innerText =
          `Location shared! Lat: ${data.lat}, Lon: ${data.lon}`;
      } else {
        document.getElementById("status").innerText = "Server error!";
      }

    } catch (err) {
      document.getElementById("status").innerText = "Network error!";
    }

  },
  () => {
    document.getElementById("status").innerText = "Permission denied";
  });
}
</script>

</body>
</html>
